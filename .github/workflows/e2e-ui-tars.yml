on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'packages/common/**'
      - 'packages/ui-tars/**'
      - '.github/workflows/e2e-ui-tars.yml'
      - 'apps/ui-tars/**'
  push:
    branches:
      - 'main'

name: UI-TARS E2E Test
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-test
  cancel-in-progress: true
env:
  CI: e2e
  NODE_OPTIONS: --max-old-space-size=8192
  HUSKY: 0
  UI_TARS_APP_PRIVATE_KEY_BASE64: placeholder-private-key

permissions:
  id-token: write # secretlint-disable-line
  contents: read
  attestations: read

jobs:
  e2e:
    name: E2E
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Cache turbo
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install pnpm
        run: npm install -g pnpm@9
      - uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
        with:
          node-version: 20
          cache: 'pnpm'
      - name: Install Python setuptools
        if: matrix.os == 'macos-latest'
        run: brew install python-setuptools
      - name: Install appdmg
        if: matrix.os == 'macos-latest'
        run: npm install -g appdmg
      - name: Install dependencies
        run: pnpm install
      - name: Build e2e app
        run: pnpm --filter ui-tars-desktop run build:e2e
      - name: Run Agent-S healthy smoke
        run: pnpm --filter ui-tars-desktop run test:e2e --grep "@agent-s-healthy"
      - name: Run Agent-S fallback smoke
        run: pnpm --filter ui-tars-desktop run test:e2e --grep "@agent-s-fallback"
      - name: Run localhost provider smoke
        run: pnpm --filter ui-tars-desktop run test:e2e --grep "@localhost-provider"
      - name: Run baseline app launch smoke
        run: pnpm --filter ui-tars-desktop run test:e2e --grep "app can launch"
      - name: Upload e2e artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-ui-tars-${{ matrix.os }}
          if-no-files-found: warn
          retention-days: 7
          path: |
            apps/ui-tars/playwright-report
            apps/ui-tars/test-results
